<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Puissance 4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <div class="noise" aria-hidden="true"></div>
  <div class="ambient ambient--a" aria-hidden="true"></div>
  <div class="ambient ambient--b" aria-hidden="true"></div>

  <header class="topbar">

    <div class="topbar-logo">
      <span class="logo-disc logo-disc--r"></span>
      <span class="logo-disc logo-disc--y"></span>
      <span class="logo-wordmark">Puissance<em>4</em></span>
    </div>

    <nav class="topbar-controls">


      <div class="ctrl-block">
        <label class="ctrl-label">Contrôle Rouge</label>
        <select id="controlR" class="ctrl-select">
          <option value="human">👤 Humain</option>
          <option value="ai">🤖 IA</option>
        </select>
      </div>

      <div class="ctrl-block">
        <label class="ctrl-label">Contrôle Jaune</label>
        <select id="controlY" class="ctrl-select">
          <option value="ai">🤖 IA</option>
          <option value="human">👤 Humain</option>
        </select>
      </div>
      <div class="ctrl-block">
        <label class="ctrl-label" for="startColor">Commence</label>
        <select id="startColor" class="ctrl-select">
          <option value="R" selected>🔴 Rouge</option>
          <option value="Y">🟡 Jaune</option>
        </select>
      </div>

      <div class="ctrl-block">
        <label class="ctrl-label" for="aiMode">Stratégie IA</label>
        <select id="aiMode" class="ctrl-select">
          <option value="random" selected>Aléatoire</option>
          <option value="minimax">Minimax</option>
          <option value="trained">Trained</option>
          <option value="hybrid">Hybrid</option>
        </select>
      </div>

      <div class="ctrl-block ctrl-block--thin">
        <label class="ctrl-label" for="depth">Profondeur</label>
        <input id="depth" type="number" min="1" max="8" value="4" class="ctrl-input ctrl-input--num" />
      </div>

      <div class="ctrl-block">
        <label class="ctrl-label" for="saveName">Nom de sauvegarde</label>
        <input id="saveName" type="text" placeholder="partie_du_jour" class="ctrl-input" />
      </div>

      <div class="ctrl-block ctrl-block--toggle">
        <label class="ctrl-label">Boutons</label>
        <label class="toggle-pill">
          <input id="noDigits" type="checkbox" checked />
          <span class="toggle-track">
            <span class="toggle-knob"></span>
          </span>
          <span class="toggle-txt">Sans chiffres</span>
        </label>
      </div>
      <div class="ctrl-block ctrl-block--paint">
        <label class="ctrl-label">Mode peinture</label>
        <div class="paint-tools">
          <button id="paintToggle" type="button" class="btn btn--ghost-sm">🎨 OFF</button>

          <select id="paintColor" class="ctrl-select ctrl-select--compact">
            <option value=".">⬜ Vide</option>
            <option value="R">🔴 Rouge</option>
            <option value="Y">🟡 Jaune</option>
          </select>

          <button id="paintClear" type="button" class="btn btn--ghost-sm">🧽 Effacer</button>
        </div>
      </div>

    </nav>

    <div class="topbar-actions">

      <div class="players-row">
        <div class="player-tag player-tag--r">
          <span class="ptag-dot"></span>
          <span id="nameR" class="ptag-name">—</span>
          <button id="changeR" class="ptag-edit" title="Renommer">✎</button>
        </div>
        <div class="player-tag player-tag--y">
          <span class="ptag-dot"></span>
          <span id="nameY" class="ptag-name">—</span>
          <button id="changeY" class="ptag-edit" title="Renommer">✎</button>
        </div>
      </div>

      <div class="action-strip">
        <button id="newGame" type="button" class="btn btn--new">
          <span class="btn-icon">◈</span> Nouvelle partie
        </button>
        <button id="stop" type="button" class="btn btn--stop">
          <span class="btn-icon">▪</span> Stop
        </button>
        <select id="saveMenu" class="ctrl-select ctrl-select--compact">
          <option value="">💾 Sauver…</option>
          <option value="json">Fichier JSON</option>
          <option value="db">Base de données</option>
        </select>
        <select id="loadMenu" class="ctrl-select ctrl-select--compact">
          <option value="">📂 Charger…</option>
          <option value="json">Fichier JSON</option>
          <option value="db">Base de données</option>
        </select>
        <input id="loadJson" type="file" accept=".json,application/json" hidden />
      </div>

    </div>
  </header>

  <main class="main-grid">

    <section class="board-col">

      <div class="status-band">
        <div id="status" class="status-text">—</div>
        <div class="status-meta">
          <span class="meta-chip">Col. <b id="colHoverInfo">—</b></span>
        </div>
      </div>

      <div class="prediction-band">
        <div id="predictionText" class="prediction-text">Prédiction : ...</div>
        <div id="paintInfo" class="paint-info" hidden>
          Mode peinture actif — clique sur une case pour la remplir
        </div>
        <button id="paintResume" type="button" class="btn btn--ghost-sm" hidden>Reprendre la partie</button>
      </div>

      <div id="colLabels" class="col-labels"></div>
      <div id="colButtons" class="col-buttons"></div>
      <div id="colScores" class="col-scores"></div>

      <div class="board-frame" id="canvasWrap">
        <i class="ca ca--tl"></i>
        <i class="ca ca--tr"></i>
        <i class="ca ca--bl"></i>
        <i class="ca ca--br"></i>
        <canvas id="board"></canvas>
      </div>

      <div class="replay-strip">
        <button id="firstMove" type="button" class="rep-btn" title="Début">⏮</button>
        <button id="prevMove" type="button" class="rep-btn" title="Précédent">◀</button>
        <div id="moveLabel" class="rep-label">Coup 0 / 0</div>
        <button id="nextMove" type="button" class="rep-btn" title="Suivant">▶</button>
        <button id="lastMove" type="button" class="rep-btn" title="Fin">⏭</button>
        <input id="moveSlider" type="range" min="0" max="0" value="0" class="rep-slider" />
      </div>

    </section>

    <aside class="side-col">

      <div class="panel panel--online">
        <div class="panel-header">
          <span class="panel-title">Multijoueur en ligne</span>
          <span id="onlineBadge" class="online-badge">Hors ligne</span>
        </div>

        <div class="online-fields">
          <input id="onlineName" type="text" placeholder="Ton pseudo" class="ctrl-input" />
          <input id="onlineCode" type="text" placeholder="Code de partie" class="ctrl-input ctrl-input--code"
            maxlength="16" autocomplete="off" />
        </div>

        <div class="online-meta">
          <span id="spectatorsInfo" class="meta-chip">👁 0</span>
        </div>

        <div class="online-actions">
          <button id="onlineCreate" type="button" class="btn btn--online">🚀 Créer</button>
          <button id="onlineJoin" type="button" class="btn btn--online-sec">🔗 Rejoindre</button>
          <button id="onlineCopyLink" type="button" class="btn btn--ghost-sm">📋 Copier lien</button>
          <button id="onlineLeave" type="button" class="btn btn--danger-sm">✖ Quitter</button>
          <button id="onlineRematch" type="button" class="btn btn--ghost-sm">🔄 Revanche</button>
        </div>
      </div>

      <div class="panel panel--stats">
        <div class="panel-header">
          <span class="panel-title">Infos partie</span>
        </div>

        <div class="stats-grid">
          <div class="stat-item">
            <span class="stat-label">Lignes</span>
            <span id="rowsVal" class="stat-value">9</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Colonnes</span>
            <span id="colsVal" class="stat-value">9</span>
          </div>
          <div class="stat-item stat-item--wide">
            <span class="stat-label">Commence</span>
            <span id="startVal" class="stat-value">—</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Partie</span>
            <span id="gameIndexVal" class="stat-value">1</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Coups</span>
            <span id="movesVal" class="stat-value">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Vue</span>
            <span id="viewVal" class="stat-value">0</span>
          </div>
        </div>
      </div>

      <div class="panel panel--history">
        <div class="panel-header">
          <span class="panel-title">Historique</span>
          <button id="clearHistory" type="button" class="btn btn--ghost-sm">🗑 Vider</button>
        </div>
        <div class="hist-scroll">
          <table class="hist-table">
            <thead>
              <tr>
                <th>Joueur</th>
                <th>Action</th>
                <th>Partie</th>
                <th>Coup</th>
                <th>Col.</th>
                <th>Quand</th>
              </tr>
            </thead>
            <tbody id="historyBody"></tbody>
          </table>
        </div>
      </div>

    </aside>
  </main>

  <script src="./game.js"></script>
</body>

</html>
